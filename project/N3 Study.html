<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>墨 · N3 Study</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script type="application/json" id="om-validate">{"checks":{"console":true}}</script>

<style>
  :root {
    --paper:        #ece4d3;
    --paper-warm:   #e6dcc6;
    --paper-light:  #f4eddd;
    --card:         #f7f1e1;
    --card-raised:  #fbf6e8;
    --ink:          #1a1814;
    --ink-2:        #36322a;
    --ink-3:        #5b5448;
    --ink-4:        #8a8170;
    --line:         #cfc3a8;
    --line-soft:    #ddd1b6;
    --indigo:       #3b5573;
    --indigo-soft:  #5e7591;
    --persimmon:    #b3563a;
    --moss:         #6c7a4a;
    --gold:         #a8884b;
    --rouge:        #8a3a3a;

    --serif-jp: "Shippori Mincho", "Noto Serif JP", "Yu Mincho", serif;
    --serif-en: "Newsreader", "EB Garamond", Georgia, serif;
    --sans:     "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono:     "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* faint washi grain over the whole canvas */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    background-image:
      radial-gradient(rgba(120,100,70,.06) 1px, transparent 1.2px),
      radial-gradient(rgba(120,100,70,.04) 1px, transparent 1.2px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    opacity: .9;
    mix-blend-mode: multiply;
  }

  ::selection { background: #1a18141a; }

  /* shared utilities */
  .jp { font-family: var(--serif-jp); font-weight: 500; }
  .jp-disp { font-family: var(--serif-jp); font-weight: 600; letter-spacing: .02em; }
  .en-disp { font-family: var(--serif-en); font-weight: 400; letter-spacing: -.01em; }
  .mono { font-family: var(--mono); font-size: 11px; letter-spacing: .04em; }
  .label {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-4);
  }

  ruby rt {
    font-family: var(--serif-jp);
    font-size: .42em;
    font-weight: 400;
    color: var(--ink-4);
    letter-spacing: 0;
  }

  /* simple buttons */
  button {
    font: inherit;
    background: none;
    border: 0;
    cursor: pointer;
    color: inherit;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-2);
    font-weight: 500;
    font-size: 13px;
    transition: all .15s ease;
  }
  .btn:hover { border-color: var(--ink-4); background: var(--card-raised); }
  .btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-primary:hover { background: var(--ink-2); border-color: var(--ink-2); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--ink-3); }
  .btn-ghost:hover { background: var(--paper-warm); color: var(--ink); border-color: transparent; }

  /* enso ring (the brush circle used in logo) */
  .enso {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2.5px solid var(--ink);
    border-right-color: transparent;
    border-bottom-color: rgba(26,24,20,.35);
    transform: rotate(-22deg);
    flex-shrink: 0;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  /* APP LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 232px 1fr;
    min-height: 100vh;
    width: 100%;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--paper-warm);
    padding: 28px 18px 22px;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 6px 26px;
    border-bottom: 1px dashed var(--line);
    margin-bottom: 18px;
  }
  .brand-name {
    font-family: var(--serif-jp);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: .04em;
  }
  .brand-name .sub {
    display: block;
    font-family: var(--serif-en);
    font-size: 11px;
    font-style: italic;
    color: var(--ink-4);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-section {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .22em;
    color: var(--ink-4);
    padding: 18px 12px 8px;
    text-transform: uppercase;
  }
  .nav-item {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    color: var(--ink-3);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all .12s ease;
  }
  .nav-item:hover { background: rgba(26,24,20,.05); color: var(--ink); }
  .nav-item.active {
    background: var(--ink);
    color: var(--paper-light);
  }
  .nav-item .glyph {
    font-family: var(--serif-jp);
    font-size: 18px;
    text-align: center;
    line-height: 1;
    font-weight: 500;
  }
  .nav-item.active .glyph { color: var(--paper-light); }
  .nav-item .badge {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--paper);
    color: var(--ink-3);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--line);
  }
  .nav-item.active .badge {
    background: rgba(255,255,255,.1);
    color: var(--paper-light);
    border-color: transparent;
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
  }
  .streak-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .streak-num {
    font-family: var(--serif-en);
    font-size: 32px;
    line-height: 1;
    font-weight: 500;
    color: var(--persimmon);
  }
  .streak-label {
    font-size: 11px;
    color: var(--ink-3);
    line-height: 1.3;
  }
  .streak-label b { color: var(--ink); display: block; font-weight: 600; }

  /* ---------- MAIN ---------- */
  .main {
    padding: 36px 56px 80px;
    max-width: 1280px;
    width: 100%;
    margin: 0 auto;
  }

  .page-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .page-title {
    font-family: var(--serif-en);
    font-size: 44px;
    line-height: 1;
    font-weight: 400;
    margin: 0;
    letter-spacing: -.01em;
  }
  .page-title .kanji {
    font-family: var(--serif-jp);
    font-weight: 500;
    margin-right: 14px;
    color: var(--ink-2);
  }
  .page-sub {
    font-family: var(--serif-en);
    font-style: italic;
    color: var(--ink-4);
    font-size: 14px;
    margin-top: 6px;
  }

  /* CARD primitives */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 22px;
  }
  .card.raised {
    background: var(--card-raised);
    box-shadow:
      0 1px 0 rgba(26,24,20,.02),
      0 8px 28px -16px rgba(26,24,20,.18);
  }

  /* ---------- TWEAKS handled by tweaks-panel.jsx ---------- */
  /* hidden initially */
</style>

</head>
