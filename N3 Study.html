function useTweaks(defaults) {

  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {

    const panel = dragRef.current; if (!panel) return;

    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = { x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)), y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)) };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';

    if (!open) return;

    const onMsg = (e) => { const t = e?.data?.type; if (t === '__activate_edit_mode') setOpen(true); else if (t === '__deactivate_edit_mode') setOpen(false); };

    return () => window.removeEventListener('message', onMsg);
  }, []);

    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;

    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };

    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => { if (min != null && n < min) return min; if (max != null && n > max) return max; return n; };
  const startRef = React.useRef({ x: 0, val: 0 });

function __twkIsLight(hex) {

const __TwkCheck = ({ light }) => (<svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} /></svg>);
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} /></div>);
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase(); const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => { const colors = Array.isArray(o) ? o : [o]; const [hero, ...rest] = colors; const sup = rest.slice(0, 4); const on = key(o) === cur;
          return (<button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on ? '1' : '0'} aria-label={colors.join(', ')} title={colors.join(' · ')} style={{ background: hero }} onClick={() => onChange(o)}>{sup.length > 0 && (<span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>)}{on && <__TwkCheck light={__twkIsLight(hero)} />}</button>);
        })}
      </div>
    </TweakRow>
  );
}
function TweakButton({ label, onClick, secondary = false }) {
  return (<button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'} onClick={onClick}>{label}</button>);
}

Object.assign(window, {

<script type="text/babel">

const SRS_KEY = 'sumi.n3.srs.v1';
const SRS = {
  load() { try { return JSON.parse(localStorage.getItem(SRS_KEY) || '{}'); } catch { return {}; } },
  save(state) { try { localStorage.setItem(SRS_KEY, JSON.stringify(state)); } catch {} },
  apply(card, grade, now = Date.now()) {
    const next = { ef: 2.5, ivl: 0, reps: 0, due: now, lapses: 0, ...card };
    const MIN_EF = 1.3;
    if (grade === 'again') { next.reps = 0; next.lapses += 1; next.ef = Math.max(MIN_EF, next.ef - 0.2); next.ivl = 0; next.due = now + 60 * 1000; }
    else { next.reps += 1; if (grade === 'hard') next.ef = Math.max(MIN_EF, next.ef - 0.15); if (grade === 'easy') next.ef = next.ef + 0.15; if (next.reps === 1) next.ivl = grade === 'easy' ? 4 : 1; else if (next.reps === 2) next.ivl = grade === 'easy' ? 7 : 3; else next.ivl = Math.round(next.ivl * next.ef * (grade === 'hard' ? 0.8 : grade === 'easy' ? 1.3 : 1)); next.due = now + next.ivl * 86400000; }
    return next;
  }
};

  }, [deck, theme]);
  const weakCount = uM2(() => Object.values(state).filter(s => s.ef < 1.8 || s.lapses >= 2).length, [state]);
  const queue = uM2(() => {
    const now = Date.now();
    if (weakMode) {
      return filteredDeck.map((c, i) => ({ i, c, s: state[c.jp] })).filter(x => x.s && (x.s.ef < 1.8 || x.s.lapses >= 2));
    }
    const due = filteredDeck.map((c, i) => ({ i, c, s: state[c.jp] })).filter(x => x.s && x.s.due <= now).sort((a, b) => a.s.due - b.s.due);
    const newCards = filteredDeck.map((c, i) => ({ i, c, s: null })).filter(x => !state[x.c.jp]);
    return [...due, ...newCards];
  }, [filteredDeck, state, tick, weakMode]);
  const current = queue[0];
  const grade = (g) => {

    const next = SRS.apply(state[current.c.jp] || {}, g);

  };

  });

        {weakCount > 0 && <button onClick={() => setWeakMode(m => !m)} style={{ marginLeft: 6, padding: '3px 12px', borderRadius: 999, border: '1px solid', borderColor: weakMode ? 'var(--rouge)' : 'var(--line)', background: weakMode ? 'var(--rouge)' : 'transparent', color: weakMode ? 'var(--paper-light)' : 'var(--ink-3)', fontSize: 11, cursor: 'pointer', fontFamily: 'var(--mono)' }}>⚠ WEAK ({weakCount})</button>}

        <div className="mono" style={{ color: 'var(--ink-4)', marginTop: 18 }}>{reviewedCount} reviewed this session</div>

        <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>

const Listening2 = () => {
  const lines = window.N3_LISTENING;
  const dialogues = window.N3_DIALOGUES;
  const [mode, setMode] = uS2('dialogue');
  const [rate, setRate] = uS2(0.9);
  const [revealAll, setRevealAll] = uS2({});
  const [diaIdx, setDiaIdx] = uS2(0);
  const [playingTurn, setPlayingTurn] = uS2(-1);
  const playRunRef = uR2(0);
  const dia = dialogues[diaIdx];
  const playDialogue = async () => {
    const runId = ++playRunRef.current;
    for (let i = 0; i < dia.turns.length; i++) {
      if (runId !== playRunRef.current) return;
      setPlayingTurn(i); window.speakJP(dia.turns[i].jp, rate);
      await new Promise(res => { const check = () => { if (runId !== playRunRef.current) return res(); if (!window.speechSynthesis.speaking) return setTimeout(res, 380); setTimeout(check, 120); }; setTimeout(check, 300); });
    }
    setPlayingTurn(-1);
  };
  const stopDialogue = () => { playRunRef.current++; window.speechSynthesis.cancel(); setPlayingTurn(-1); };
  return (
    <div data-screen-label="06 Listening">
      <div className="page-head">
        <div><h1 className="page-title"><span className="kanji">聴解</span>Listening</h1><div className="page-sub">Dialogues and single lines</div></div>
        <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
          <div style={{ display: 'flex', border: '1px solid var(--line)', borderRadius: 999, padding: 3 }}>
            {['dialogue', 'lines'].map(m => (
              <button key={m} onClick={() => setMode(m)} style={{ padding: '6px 14px', borderRadius: 999, border: 'none', cursor: 'pointer', background: mode === m ? 'var(--ink)' : 'transparent', color: mode === m ? 'var(--paper-light)' : 'var(--ink-3)', fontSize: 12, fontWeight: 500 }}>{m === 'dialogue' ? 'Dialogues' : 'Single lines'}</button>
            ))}
          </div>
          <span className="mono" style={{ color: 'var(--ink-4)' }}>SPEED</span>
          {[0.7, 0.9, 1.0].map(r => (
            <button key={r} onClick={() => setRate(r)} className="btn" style={{ background: rate === r ? 'var(--ink)' : 'var(--card)', color: rate === r ? 'var(--paper-light)' : 'var(--ink-2)', borderColor: rate === r ? 'var(--ink)' : 'var(--line)' }}>{r}×</button>
          ))}
        </div>
      </div>
      {mode === 'dialogue' ? (
        <div style={{ display: 'grid', gridTemplateColumns: '240px 1fr', gap: 28 }}>
          <div>
            <div className="label" style={{ marginBottom: 10 }}>Scenarios</div>
            {dialogues.map((d, i) => (
              <button key={i} onClick={() => { stopDialogue(); setDiaIdx(i); }} style={{ display: 'block', width: '100%', textAlign: 'left', padding: '12px 14px', border: '1px solid var(--line)', borderRadius: 8, marginBottom: 8, background: i === diaIdx ? 'var(--ink)' : 'var(--card)', color: i === diaIdx ? 'var(--paper-light)' : 'var(--ink)', cursor: 'pointer' }}>
                <div className="jp" style={{ fontWeight: 600 }}>{d.title}</div>
                <div className="en-disp" style={{ fontSize: 12, fontStyle: 'italic', opacity: .65, marginTop: 4 }}>"{d.en_title}"</div>
              </button>
            ))}
          </div>
          <div className="card raised" style={{ padding: '28px 32px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 22 }}>
              <div><div className="label">Dialogue</div><h2 className="jp-disp" style={{ fontSize: 28, margin: '4px 0 0' }}>{dia.title}</h2></div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn" onClick={() => setRevealAll(r => ({ ...r, [diaIdx]: !r[diaIdx] }))}>{revealAll[diaIdx] ? 'Hide transcript' : 'Reveal transcript'}</button>
                {playingTurn === -1 ? <button className="btn btn-primary" onClick={playDialogue}>▶ Play full</button> : <button className="btn" onClick={stopDialogue}>■ Stop</button>}
              </div>
            </div>
            <div style={{ display: 'grid', gap: 14 }}>
              {dia.turns.map((t, i) => {
                const isA = t.s === 'A'; const playing = playingTurn === i;
                return (
                  <div key={i} style={{ display: 'grid', gridTemplateColumns: '40px 1fr auto', gap: 14, alignItems: 'flex-start', padding: '14px 16px', background: playing ? 'var(--paper-light)' : 'transparent', borderLeft: '3px solid', borderLeftColor: playing ? (isA ? 'var(--indigo)' : 'var(--persimmon)') : 'transparent', borderRadius: '0 8px 8px 0', transition: 'all .15s' }}>
                    <div style={{ width: 32, height: 32, borderRadius: '50%', background: isA ? 'var(--indigo)' : 'var(--persimmon)', color: 'var(--paper-light)', display: 'grid', placeItems: 'center', fontFamily: 'var(--mono)', fontSize: 12, fontWeight: 600 }}>{t.s}</div>
                    <div>
                      <div className="jp" style={{ fontSize: 18, lineHeight: 1.5 }}>{t.jp}</div>
                      {revealAll[diaIdx] && <div className="en-disp" style={{ fontSize: 13, fontStyle: 'italic', color: 'var(--ink-4)', marginTop: 6 }}>"{t.en}"</div>}
                    </div>

        <div style={{ display: 'grid', gap: 14 }}>

              <div style={{ display: 'flex', gap: 22, alignItems: 'center' }}>
                <button onClick={() => window.speakJP(l.jp, rate)} style={{ width: 56, height: 56, borderRadius: '50%', background: 'var(--ink)', color: 'var(--paper-light)', display: 'grid', placeItems: 'center', flexShrink: 0, border: 'none', cursor: 'pointer' }}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z" /></svg>
                </button>
                <div style={{ flex: 1 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <div>
                      <div className="mono" style={{ color: 'var(--ink-4)', marginBottom: 4 }}>LINE {String(i + 1).padStart(2, '0')}</div>
                      {revealAll['L' + i] ? (<>
                        <div className="jp" style={{ fontSize: 19 }}>{l.jp}</div>
                        <div className="jp" style={{ color: 'var(--ink-4)', fontSize: 13 }}>{l.kana}</div>
                        <div className="en-disp" style={{ fontStyle: 'italic', color: 'var(--ink-3)', marginTop: 6, fontSize: 14 }}>"{l.en}"</div>
                      </>) : (<div style={{ color: 'var(--ink-4)', fontStyle: 'italic', fontSize: 14 }}>Transcript hidden — listen first</div>)}
                    </div>
                    <button className="btn btn-ghost" onClick={() => setRevealAll(r => ({ ...r, ['L' + i]: !r['L' + i] }))}>{revealAll['L' + i] ? 'Hide' : 'Reveal'}</button>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const Cloze = () => {
  const items = window.N3_CLOZE;
  const [idx, setIdx] = uS2(0);
  const [picked, setPicked] = uS2(null);
  const [stats, setStats] = uS2({ right: 0, wrong: 0 });
  const item = items[idx];
  const pick = (c) => { if (picked !== null) return; setPicked(c); setStats(s => c === item.answer ? { ...s, right: s.right + 1 } : { ...s, wrong: s.wrong + 1 }); };
  const next = () => { setPicked(null); setIdx(i => (i + 1) % items.length); };
  return (
    <div data-screen-label="08 Cloze">
      <div className="page-head">
        <div><h1 className="page-title"><span className="kanji">穴埋め</span>Cloze</h1><div className="page-sub">Sentence mining — fill the gap</div></div>
        <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
          <span className="mono" style={{ color: 'var(--moss)' }}>● {stats.right} right</span>
          <span className="mono" style={{ color: 'var(--rouge)' }}>● {stats.wrong} wrong</span>
          <span className="mono" style={{ color: 'var(--ink-4)' }}>{idx + 1}/{items.length}</span>
        </div>
      </div>
      <div className="card raised" style={{ maxWidth: 820, margin: '0 auto', padding: '48px 56px' }}>
        <div className="label" style={{ marginBottom: 8 }}>Complete the sentence</div>
        <div className="jp" style={{ fontSize: 28, lineHeight: 1.8 }}>
          {item.parts.map((p, i) => p === 'BLANK' ? (
            <span key={i} style={{ display: 'inline-block', minWidth: 96, textAlign: 'center', padding: '2px 12px', borderBottom: '2px solid var(--ink)', background: picked ? (picked === item.answer ? 'rgba(108,122,74,.18)' : 'rgba(138,58,58,.15)') : 'var(--paper-light)', borderRadius: '4px 4px 0 0', fontFamily: 'var(--serif-jp)', color: picked ? 'var(--ink)' : 'var(--ink-4)' }}>{picked || '______'}</span>
          ) : <span key={i}>{p}</span>)}
        </div>
        <div className="en-disp" style={{ fontStyle: 'italic', color: 'var(--ink-4)', marginTop: 12, fontSize: 14 }}>hint: <span style={{ color: 'var(--ink-3)' }}>"{item.gloss}"</span></div>
        <div style={{ marginTop: 36, display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
          {item.choices.map(c => {
            const isAnswer = c === item.answer; const isPicked = c === picked;
            let bg = 'var(--card)', color = 'var(--ink)', border = 'var(--line)';
            if (picked) { if (isAnswer) { bg = 'rgba(108,122,74,.15)'; border = 'var(--moss)'; } else if (isPicked) { bg = 'rgba(138,58,58,.12)'; border = 'var(--rouge)'; } else { color = 'var(--ink-4)'; } }
            return (<button key={c} onClick={() => pick(c)} disabled={!!picked} style={{ padding: '14px 18px', borderRadius: 8, border: '1px solid', borderColor: border, background: bg, color, cursor: picked ? 'default' : 'pointer', fontFamily: 'var(--serif-jp)', fontSize: 22, fontWeight: 500 }}>{c}</button>);
          })}
        </div>
        {picked && (
          <div style={{ marginTop: 28, paddingTop: 18, borderTop: '1px dashed var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>{picked === item.answer ? <span className="en-disp" style={{ color: 'var(--moss)', fontSize: 18 }}>✓ Correct</span> : <><span className="en-disp" style={{ color: 'var(--rouge)', fontSize: 18 }}>✗ Not quite</span><span className="en-disp" style={{ color: 'var(--ink-4)', fontStyle: 'italic', marginLeft: 12 }}>→ answer: <b className="jp" style={{ color: 'var(--ink)' }}>{item.answer}</b></span></>}</div>
            <button className="btn btn-primary" onClick={next}>Next →</button>
          </div>
        )}
      </div>
    </div>
  );
};

const buildConjQueue = () => {
  const list = [];
  for (const w of window.N3_CONJ) for (const p of w.prompts) list.push({ word: w.word, type: w.type, ...p });
  for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
  return list;
};

const Conjugate = () => {
  const [queue, setQueue] = uS2(() => buildConjQueue());
  const [idx, setIdx] = uS2(0);
  const [input, setInput] = uS2('');
  const [result, setResult] = uS2(null);
  const [score, setScore] = uS2({ right: 0, wrong: 0 });
  const inputRef = uR2(null);
  const item = queue[idx];
  uE2(() => { inputRef.current?.focus(); }, [idx]);
  const submit = () => { if (result) return; if (!input.trim()) return; const ok = input.trim() === item.ans; setResult(ok ? 'right' : 'wrong'); setScore(s => ok ? { ...s, right: s.right + 1 } : { ...s, wrong: s.wrong + 1 }); };
  const next = () => { if (idx + 1 >= queue.length) { setQueue(buildConjQueue()); setIdx(0); } else setIdx(i => i + 1); setInput(''); setResult(null); };
  const skip = () => { setResult('wrong'); setScore(s => ({ ...s, wrong: s.wrong + 1 })); };
  return (
    <div data-screen-label="09 Conjugate">
      <div className="page-head">
        <div><h1 className="page-title"><span className="kanji">活用</span>Conjugate</h1><div className="page-sub">Verbs and adjectives — type the form</div></div>
        <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}><span className="mono" style={{ color: 'var(--moss)' }}>● {score.right}</span><span className="mono" style={{ color: 'var(--rouge)' }}>● {score.wrong}</span><span className="mono" style={{ color: 'var(--ink-4)' }}>{idx + 1}/{queue.length}</span></div>
      </div>
      <div className="card raised" style={{ maxWidth: 720, margin: '0 auto', padding: '56px 56px 38px' }}>
        <div className="label" style={{ marginBottom: 10 }}>{item.type}</div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 16, flexWrap: 'wrap' }}>
          <span className="jp-disp" style={{ fontSize: 64 }}>{item.word}</span>
          <span className="en-disp" style={{ fontSize: 20, color: 'var(--ink-4)', fontStyle: 'italic' }}>→ {item.target}</span>
        </div>
        <div className="en-disp" style={{ fontSize: 14, color: 'var(--ink-4)', fontStyle: 'italic', marginTop: 6 }}>"{item.en}"</div>
        <div style={{ marginTop: 36 }}>
          <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') result ? next() : submit(); }} placeholder="…" readOnly={!!result}
            style={{ width: '100%', padding: '18px 22px', fontFamily: 'var(--serif-jp)', fontSize: 30, fontWeight: 500, border: '1px solid', borderColor: result === 'right' ? 'var(--moss)' : result === 'wrong' ? 'var(--rouge)' : 'var(--line)', background: 'var(--paper-light)', color: 'var(--ink)', borderRadius: 10, outline: 'none', textAlign: 'center' }} />
        </div>
        <div style={{ marginTop: 22, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ minHeight: 28 }}>
            {result === 'right' && <span className="en-disp" style={{ color: 'var(--moss)', fontSize: 18 }}>✓ Correct</span>}
            {result === 'wrong' && <><span className="en-disp" style={{ color: 'var(--rouge)', fontSize: 18 }}>✗</span><span className="en-disp" style={{ color: 'var(--ink-4)', fontStyle: 'italic', marginLeft: 10 }}>→ <b className="jp" style={{ color: 'var(--ink)', fontSize: 22 }}>{item.ans}</b></span></>}
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            {!result && <button className="btn btn-ghost" onClick={skip}>Show answer</button>}
            {!result ? <button className="btn btn-primary" onClick={submit}>Check · <span className="mono">↵</span></button> : <button className="btn btn-primary" onClick={next}>Next · <span className="mono">↵</span></button>}
          </div>
        </div>
      </div>
      <div style={{ textAlign: 'center', marginTop: 16, color: 'var(--ink-4)', fontSize: 12 }}>Type in Japanese (IME on). Hit <span className="mono">↵</span> to check / advance.</div>
    </div>
  );
};

function shuffle(a) { a = [...a]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

const buildMock = () => {
  const vocab = shuffle(window.N3_VOCAB).slice(0, 8);
  const vocabQ = vocab.map(v => { const distractors = shuffle(window.N3_VOCAB.filter(x => x.jp !== v.jp)).slice(0, 3).map(x => x.en); return { section: 'Vocabulary', prompt: v.jp, sub: v.kana, question: 'Choose the correct meaning.', choices: shuffle([v.en, ...distractors]), answer: v.en }; });
  const gram = shuffle(window.N3_CLOZE).slice(0, 6).map(c => ({ section: 'Grammar', prompt: c.parts.map(p => p === 'BLANK' ? '＿＿＿' : p).join(''), sub: '"' + c.gloss + '"', question: 'Choose the grammar that fills the blank.', choices: c.choices, answer: c.answer }));
  const r = window.N3_READING[Math.floor(Math.random() * window.N3_READING.length)];
  const rText = r.tokens.map(t => typeof t === 'string' ? t : t.k).join('');
  const readQ = [{ section: 'Reading', passage: rText, passageTitle: r.title, prompt: 'Comprehension', sub: r.en_title, question: 'Which best matches the passage?', choices: shuffle([r.translation.split('.')[0] + '.', 'A character regrets a decision and cannot move on.', 'The narrator describes a crowded train station at rush hour.', 'A debate about modern technology and traditional values.']), answer: r.translation.split('.')[0] + '.' }];
  const dchoices = shuffle(window.N3_DIALOGUES).slice(0, 3);
  const lstQ = dchoices.map(d => { const correct = d.en_title; const distractors = shuffle(window.N3_DIALOGUES.filter(x => x.en_title !== correct)).slice(0, 3).map(x => x.en_title); return { section: 'Listening', listenScript: d.turns.map(t => t.jp).join(' '), prompt: '▶  Press play, then choose', sub: 'Listen carefully — what is the topic?', question: 'What is this conversation about?', choices: shuffle([correct, ...distractors]), answer: correct }; });
  return [...vocabQ, ...gram, ...readQ, ...lstQ];
};

const Mock = () => {
  const [phase, setPhase] = uS2('intro');
  const [qs, setQs] = uS2([]);
  const [idx, setIdx] = uS2(0);
  const [answers, setAnswers] = uS2({});
  const [timeLeft, setTimeLeft] = uS2(20 * 60);
  const tickRef = uR2(null);
  uE2(() => { if (phase !== 'test') return; tickRef.current = setInterval(() => setTimeLeft(t => { if (t <= 1) { clearInterval(tickRef.current); finish(); return 0; } return t - 1; }), 1000); return () => clearInterval(tickRef.current); }, [phase]);
  const begin = () => { setQs(buildMock()); setIdx(0); setAnswers({}); setTimeLeft(20 * 60); setPhase('test'); };
  const finish = () => { clearInterval(tickRef.current); setPhase('result'); };
  const pick = (c) => { setAnswers(a => ({ ...a, [idx]: c })); };
  const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  if (phase === 'intro') return (
    <div data-screen-label="10 Mock">
      <div className="page-head"><div><h1 className="page-title"><span className="kanji">模試</span>Mock test</h1><div className="page-sub">A short JLPT N3-style mock</div></div></div>
      <div className="card raised" style={{ maxWidth: 720, margin: '0 auto', padding: '40px 48px', textAlign: 'center' }}>
        <div className="jp-disp" style={{ fontSize: 48 }}>準備はいい？</div>
        <div className="en-disp" style={{ fontStyle: 'italic', color: 'var(--ink-3)', fontSize: 18, marginTop: 8 }}>"Ready to begin?"</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 18, margin: '36px 0' }}>
          {[{ k: '語彙', en: 'Vocab', n: '8 Q' }, { k: '文法', en: 'Grammar', n: '6 Q' }, { k: '読解', en: 'Reading', n: '1 Q' }, { k: '聴解', en: 'Listening', n: '3 Q' }].map(s => (
            <div key={s.k} style={{ padding: '16px 8px', border: '1px solid var(--line)', borderRadius: 8 }}>
              <div className="jp-disp" style={{ fontSize: 28 }}>{s.k}</div>
              <div className="mono" style={{ color: 'var(--ink-4)', marginTop: 6 }}>{s.en.toUpperCase()}</div>
              <div className="en-disp" style={{ fontSize: 14, color: 'var(--ink-3)', marginTop: 6 }}>{s.n}</div>
            </div>
          ))}
        </div>
        <div className="en-disp" style={{ color: 'var(--ink-4)', fontStyle: 'italic', fontSize: 14, marginBottom: 24 }}>20-minute timer · 18 questions · partial credit by section</div>
        <button className="btn btn-primary" onClick={begin} style={{ fontSize: 15, padding: '14px 28px' }}>Begin mock test →</button>
      </div>
    </div>
  );
  if (phase === 'result') {
    const bySection = {};
    qs.forEach((q, i) => { bySection[q.section] = bySection[q.section] || { right: 0, total: 0 }; bySection[q.section].total++; if (answers[i] === q.answer) bySection[q.section].right++; });
    const totalRight = Object.values(bySection).reduce((a, s) => a + s.right, 0);
    const pct = Math.round(100 * totalRight / qs.length);
    return (
      <div data-screen-label="10 Mock">
        <div className="page-head"><div><h1 className="page-title"><span className="kanji">結果</span>Results</h1><div className="page-sub">Mock test · {fmt(20*60 - timeLeft)} spent</div></div><button className="btn" onClick={() => setPhase('intro')}>Try again →</button></div>
        <div className="card raised" style={{ padding: '40px 48px', marginBottom: 22, textAlign: 'center' }}>
          <div className="label" style={{ marginBottom: 12 }}>Overall</div>
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'baseline', gap: 16 }}>
            <span className="en-disp" style={{ fontSize: 96, lineHeight: 1, color: pct >= 60 ? 'var(--moss)' : pct >= 40 ? 'var(--persimmon)' : 'var(--rouge)' }}>{pct}%</span>
            <span className="mono" style={{ color: 'var(--ink-4)' }}>{totalRight} / {qs.length}</span>
          </div>
        </div>
        <div className="card raised" style={{ padding: 0 }}>
          {Object.entries(bySection).map(([sec, s], i) => (
            <div key={sec} style={{ padding: '20px 28px', display: 'grid', gridTemplateColumns: '160px 1fr auto', gap: 22, alignItems: 'center', borderTop: i === 0 ? 'none' : '1px solid var(--line-soft)' }}>
              <div className="en-disp" style={{ fontSize: 20 }}>{sec}</div>
              <div style={{ height: 8, background: 'var(--line-soft)', borderRadius: 4, overflow: 'hidden' }}><div style={{ width: `${100 * s.right / s.total}%`, height: '100%', background: 'var(--ink)' }} /></div>
              <span className="mono" style={{ color: 'var(--ink-3)' }}>{s.right}/{s.total}</span>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 22 }}>
          <div className="label" style={{ marginBottom: 10 }}>Question review</div>
          <div style={{ display: 'grid', gap: 8 }}>
            {qs.map((q, i) => { const ok = answers[i] === q.answer; return (
              <div key={i} className="card" style={{ display: 'grid', gridTemplateColumns: '24px 90px 1fr 1fr', gap: 14, padding: '12px 18px', alignItems: 'center' }}>
                <span style={{ color: ok ? 'var(--moss)' : 'var(--rouge)' }}>{ok ? '✓' : '✗'}</span>
                <span className="mono" style={{ color: 'var(--ink-4)' }}>{q.section.toUpperCase()}</span>
                <span className="jp" style={{ fontSize: 14 }}>{q.prompt}</span>
                <span style={{ fontSize: 12, color: 'var(--ink-3)' }}>your: <b className="jp">{answers[i] || '—'}</b> · ans: <b className="jp">{q.answer}</b></span>
              </div>
            ); })}
          </div>
        </div>
      </div>
    );
  }
  const q = qs[idx]; const onPlay = () => q.listenScript && window.speakJP(q.listenScript, 0.9);
  return (
    <div data-screen-label="10 Mock">
      <div className="page-head">
        <div><h1 className="page-title"><span className="kanji">模試</span>Mock test</h1><div className="page-sub">Question {idx + 1} of {qs.length} · <b>{q.section}</b></div></div>
        <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}><span className="mono" style={{ color: timeLeft < 60 ? 'var(--rouge)' : 'var(--ink-3)', fontSize: 14 }}>⏱ {fmt(timeLeft)}</span><button className="btn" onClick={finish}>End early</button></div>

            <button key={i} onClick={() => pick(c)} style={{ padding: '14px 18px', borderRadius: 8, textAlign: 'left', border: '1px solid', borderColor: picked ? 'var(--ink)' : 'var(--line)', background: picked ? 'rgba(26,24,20,.05)' : 'var(--card)', cursor: 'pointer', display: 'grid', gridTemplateColumns: '28px 1fr', gap: 12, alignItems: 'center' }}>
              <span className="mono" style={{ color: 'var(--ink-4)' }}>{String.fromCharCode(65 + i)}</span>

            </button>

        </div>
        <div style={{ marginTop: 26, paddingTop: 18, borderTop: '1px dashed var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

          <div style={{ display: 'flex', gap: 4 }}>{qs.map((_, i) => (<span key={i} onClick={() => setIdx(i)} style={{ width: 10, height: 10, borderRadius: '50%', background: answers[i] ? 'var(--ink)' : 'var(--line)', outline: i === idx ? '2px solid var(--ink)' : 'none', outlineOffset: 2, cursor: 'pointer' }} />))}</div>
          {idx === qs.length - 1 ? <button className="btn btn-primary" onClick={finish}>Submit ✓</button> : <button className="btn btn-primary" onClick={() => setIdx(i => i + 1)}>Next →</button>}
        </div>
      </div>
    </div>
  );
};

const ImportExport = () => {
  const [csv, setCsv] = uS2('');
  const [imported, setImported] = uS2([]);
  const [imsg, setImsg] = uS2('');
  const fileRef = uR2(null);
  const IMPORT_KEY = 'sumi.n3.userdeck.v1';
  uE2(() => { try { setImported(JSON.parse(localStorage.getItem(IMPORT_KEY) || '[]')); } catch {} }, []);
  const parseCsv = (txt) => { const rows = txt.split(/\r?\n/).map(l => l.trim()).filter(Boolean); return rows.map(r => { const cols = r.split(/\t|,/).map(c => c.trim()); const [jp, kana, en, ex_jp = '', ex_en = ''] = cols; return { jp, kana, en, pos: 'user', ex: { jp: ex_jp, en: ex_en } }; }).filter(x => x.jp && x.en); };
  const doImport = () => { const parsed = parseCsv(csv); if (!parsed.length) { setImsg('No valid rows found. Each line: word, reading, meaning, [example_jp], [example_en]'); return; } const merged = [...imported, ...parsed]; localStorage.setItem(IMPORT_KEY, JSON.stringify(merged)); setImported(merged); window.N3_VOCAB = (window.N3_VOCAB || []).concat(parsed); setCsv(''); setImsg(`Added ${parsed.length} item${parsed.length === 1 ? '' : 's'} to your deck.`); };
  const clearImport = () => { localStorage.removeItem(IMPORT_KEY); setImported([]); setImsg('User deck cleared.'); };
  const onFile = async (e) => { const f = e.target.files?.[0]; if (!f) return; setCsv(await f.text()); };
  const exportProgress = () => { const data = { exported: new Date().toISOString(), srs: SRS.load(), userDeck: imported, app: 'sumi.n3', version: 1 }; const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `sumi-n3-progress-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url); };
  const exportAnki = () => {
    const deck = window.N3_VOCAB || [];
    const header = '#separator:tab\n#html:false\n#notetype:Basic\n#deck:Sumi N3\n#tags column:6\n';
    const rows = deck.map(v => [v.jp, `${v.kana || ''}\n${v.en || ''}`, v.ex?.jp || '', v.ex?.en || '', v.pos || '', 'N3 Sumi'].join('\t'));
    const blob = new Blob([header + rows.join('\n')], { type: 'text/plain; charset=utf-8' });
    const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `sumi-n3-anki-${new Date().toISOString().slice(0,10)}.txt`; a.click(); URL.revokeObjectURL(url);
  };
  const importProgress = async (e) => { const f = e.target.files?.[0]; if (!f) return; try { const data = JSON.parse(await f.text()); if (data.srs) { localStorage.setItem(SRS_KEY, JSON.stringify(data.srs)); } if (data.userDeck) { localStorage.setItem(IMPORT_KEY, JSON.stringify(data.userDeck)); setImported(data.userDeck); } setImsg('Progress restored — switch to Cards to see it.'); } catch (err) { setImsg('Could not parse file.'); } };
  const srs = SRS.load(); const srsCount = Object.keys(srs).length; const totalReps = Object.values(srs).reduce((a, s) => a + (s.reps || 0), 0);
  return (
    <div data-screen-label="11 Import">
      <div className="page-head"><div><h1 className="page-title"><span className="kanji">入出</span>Import &amp; export</h1><div className="page-sub">Bring your own list · save your progress</div></div></div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 22, marginBottom: 22 }}>
        <div className="card raised">
          <div className="label" style={{ marginBottom: 8 }}>Import vocab list</div>
          <div className="en-disp" style={{ fontStyle: 'italic', color: 'var(--ink-3)', marginBottom: 14, fontSize: 14 }}>Paste CSV or TSV. Each row: <span className="mono">word, reading, meaning, [example_jp], [example_en]</span></div>
          <textarea value={csv} onChange={e => setCsv(e.target.value)} placeholder={'例:\n調子,ちょうし,condition,...\n機嫌,きげん,mood,...'} style={{ width: '100%', minHeight: 180, padding: 14, fontFamily: 'var(--mono)', fontSize: 12, lineHeight: 1.7, background: 'var(--paper-light)', border: '1px solid var(--line)', borderRadius: 8, resize: 'vertical', color: 'var(--ink)' }} />
          <div style={{ marginTop: 12, display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
            <button className="btn btn-primary" onClick={doImport}>Add to deck</button>
            <button className="btn" onClick={() => fileRef.current?.click()}>Load .csv / .tsv</button>
            <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" style={{ display: 'none' }} onChange={onFile} />
            {imported.length > 0 && <button className="btn btn-ghost" onClick={clearImport}>Clear user deck</button>}
            {imsg && <span className="en-disp" style={{ fontStyle: 'italic', color: 'var(--moss)', fontSize: 13 }}>{imsg}</span>}
          </div>
          {imported.length > 0 && (<div style={{ marginTop: 14, padding: 12, background: 'var(--paper-light)', borderRadius: 8, fontSize: 12 }}><span className="mono" style={{ color: 'var(--ink-4)' }}>USER DECK · {imported.length} items</span><div style={{ marginTop: 6, color: 'var(--ink-3)' }}>{imported.slice(0, 5).map((x, i) => <span key={i} className="jp" style={{ marginRight: 10 }}>{x.jp}</span>)}{imported.length > 5 && <span className="mono">+{imported.length - 5} more</span>}</div></div>)}
        </div>
        <div className="card raised">
          <div className="label" style={{ marginBottom: 8 }}>Progress</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 22 }}>
            <div><div className="mono" style={{ color: 'var(--ink-4)' }}>CARDS STUDIED</div><div className="en-disp" style={{ fontSize: 36, lineHeight: 1 }}>{srsCount}</div></div>
            <div><div className="mono" style={{ color: 'var(--ink-4)' }}>TOTAL REVIEWS</div><div className="en-disp" style={{ fontSize: 36, lineHeight: 1 }}>{totalReps}</div></div>
          </div>
          <div className="en-disp" style={{ fontStyle: 'italic', color: 'var(--ink-3)', marginBottom: 14, fontSize: 14 }}>Save a JSON snapshot of your SRS state and imported deck. Restore from another device or after clearing browser data.</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <button className="btn btn-primary" onClick={exportProgress}>↓ Export progress</button>
            <label className="btn" style={{ cursor: 'pointer' }}>↑ Restore from JSON<input type="file" accept=".json" style={{ display: 'none' }} onChange={importProgress} /></label>
            <button className="btn" onClick={exportAnki} title={`Export all ${(window.N3_VOCAB||[]).length} vocab cards in Anki import format`}>Anki export</button>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="label" style={{ marginBottom: 10 }}>Format reference</div>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 12, lineHeight: 1.8, color: 'var(--ink-3)', whiteSpace: 'pre-wrap' }}>{`# CSV / TSV — one entry per line, commas or tabs separate\n# columns: word, reading, meaning, example_jp (opt), example_en (opt)\n\n調子, ちょうし, condition, 体の調子が悪い, My condition is bad\n機嫌, きげん, mood\n...\n\n# Anki tip: in your deck → File → Export → "Notes in Plain Text"\n# uncheck HTML; the result drops in here cleanly.`}</div>
      </div>
    </div>
  );
};

<!-- ── PERSONAL LAYER (onboarding, real stats, dynamic Today) ── -->
<script type="text/babel">
(() => {
  const { useState, useEffect } = React;
  const KEY = 'sumi.n3.personal.v1';
  const todayStr = () => new Date().toISOString().slice(0, 10);
  const defaults = () => ({ name: '', started: null, target: '', lastStudy: null, streak: 0, days: {}, daily: {}, seenKanji: [], seenGrammar: [], mockScore: null });
  const load = () => { try { return { ...defaults(), ...JSON.parse(localStorage.getItem(KEY) || '{}') }; } catch { return defaults(); } };
  const subs = new Set();
  const emit = () => subs.forEach(fn => { try { fn(); } catch {} });
  const save = (s) => { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch {} emit(); };
  const computeStreak = (s) => { let n = 0; const d = new Date(); while (true) { const k = d.toISOString().slice(0, 10); if (s.days[k]) { n++; d.setDate(d.getDate() - 1); } else break; } return n; };

  const Stats = {
    get: load,
    subscribe(fn) { subs.add(fn); return () => subs.delete(fn); },
    touch(kind, n = 1) { const s = load(); const k = todayStr(); if (n > 0) s.days[k] = (s.days[k] || 0) + n; if (kind) { s.daily[k] = s.daily[k] || {}; s.daily[k][kind] = true; } s.lastStudy = k; s.streak = computeStreak(s); save(s); },
    setName(name, target) { const s = load(); if (!s.started) s.started = Date.now(); s.name = name; if (target) s.target = target; save(s); },
    reset() { try { localStorage.removeItem(KEY); localStorage.removeItem('sumi.n3.srs.v1'); localStorage.removeItem('sumi.n3.userdeck.v1'); } catch {} emit(); },
    heat14() { const s = load(); const out = []; const d = new Date(); d.setDate(d.getDate() - 13); for (let i = 0; i < 14; i++) { out.push(s.days[d.toISOString().slice(0, 10)] || 0); d.setDate(d.getDate() + 1); } return out; },
    heat30() { const s = load(); const out = []; const d = new Date(); d.setDate(d.getDate() - 29); for (let i = 0; i < 30; i++) { out.push(s.days[d.toISOString().slice(0, 10)] || 0); d.setDate(d.getDate() + 1); } return out; },
    dayN() { const s = load(); if (!s.started) return 0; return Math.floor((Date.now() - s.started) / 86400000) + 1; },
  };
  window.SumiStats = Stats;

  const Onboarding = () => {
    const [s, setS] = useState(Stats.get());
    useEffect(() => Stats.subscribe(() => setS(Stats.get())), []);
    const [name, setName] = useState('');
    const [target, setTarget] = useState('');
    if (s.name) return null;
    const submit = (e) => { if (e) e.preventDefault(); const n = name.trim() || '友'; Stats.setName(n, target); };
    return (
      <div style={{ position: 'fixed', inset: 0, zIndex: 1000, background: 'rgba(20,18,15,.62)', backdropFilter: 'blur(6px)', display: 'grid', placeItems: 'center', padding: 28 }}>
        <form onSubmit={submit} className="card raised" style={{ maxWidth: 560, width: '100%', padding: 44 }}>
          <div className="jp-disp" style={{ fontSize: 56, lineHeight: 1, marginBottom: 6 }}>初めまして</div>
          <div className="label" style={{ marginBottom: 22 }}>Hajimemashite — nice to meet you.</div>
          <p className="en-disp" style={{ fontSize: 17, color: 'var(--ink-2)', marginBottom: 28, lineHeight: 1.55 }}>This is your study journal. It starts blank — no streak, no progress, no fake numbers. Your data fills in only as you actually study.</p>
          <div style={{ marginBottom: 18 }}>
            <div className="mono" style={{ color: 'var(--ink-4)', marginBottom: 6 }}>WHAT SHOULD WE CALL YOU?</div>
            <input autoFocus value={name} onChange={e => setName(e.target.value)} placeholder="Your name" style={{ width: '100%', padding: '12px 14px', border: '1px solid var(--line)', background: 'var(--paper-light)', fontFamily: 'inherit', fontSize: 17, borderRadius: 4, color: 'var(--ink)' }} />
          </div>
          <div style={{ marginBottom: 28 }}>
            <div className="mono" style={{ color: 'var(--ink-4)', marginBottom: 6 }}>JLPT N3 TARGET DATE · OPTIONAL</div>
            <input type="date" value={target} onChange={e => setTarget(e.target.value)} style={{ width: '100%', padding: '12px 14px', border: '1px solid var(--line)', background: 'var(--paper-light)', fontFamily: 'inherit', fontSize: 16, borderRadius: 4, color: 'var(--ink)' }} />
          </div>
          <button type="submit" className="btn btn-primary" style={{ width: '100%', padding: '14px', fontSize: 15 }}>一日目 · Begin day one →</button>
          <div className="mono" style={{ marginTop: 16, color: 'var(--ink-4)', textAlign: 'center' }}>千里の道も一歩から · a journey of 1000 ri begins with one step</div>
        </form>
      </div>
    );
  };
  window.Onboarding = Onboarding;

  const mountOnboarding = () => {
    if (document.getElementById('sumi-onboarding-root')) return;
    if (!document.body) { setTimeout(mountOnboarding, 50); return; }
    const div = document.createElement('div');
    div.id = 'sumi-onboarding-root';
    document.body.appendChild(div);
    ReactDOM.createRoot(div).render(<Onboarding />);
  };
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', mountOnboarding); } else { mountOnboarding(); }

  const syncStreak = () => { const s = load(); document.querySelectorAll('.streak-num').forEach(el => { const v = String(s.streak); if (el.textContent !== v) el.textContent = v; }); };
  const mountResetLink = () => {
    if (document.getElementById('sumi-reset-link')) return;
    const footer = document.querySelector('.sidebar-footer'); if (!footer) return;
    const wrap = document.createElement('div'); wrap.id = 'sumi-reset-link';
    wrap.style.cssText = 'margin-top:14px;text-align:center;font-family:"JetBrains Mono",ui-monospace,monospace;font-size:10px;letter-spacing:.08em;color:var(--ink-4);cursor:pointer;text-transform:uppercase;padding:6px;border-top:1px dashed var(--line-soft);';
    wrap.textContent = '↻  start over';
    wrap.onmouseenter = () => { wrap.style.color = 'var(--rouge, var(--persimmon))'; };
    wrap.onmouseleave = () => { wrap.style.color = 'var(--ink-4)'; };
    wrap.onclick = () => { if (confirm('Reset everything — name, streak, SRS, imported deck, daily progress? This cannot be undone.')) { Stats.reset(); location.reload(); } };
    footer.appendChild(wrap);
  };
  setInterval(() => { syncStreak(); mountResetLink(); }, 600);
  Stats.subscribe(syncStreak);

  const origSet = localStorage.setItem.bind(localStorage);
  let lastTotalReps = null;
  localStorage.setItem = function (k, v) {
    origSet(k, v);
    if (k === 'sumi.n3.srs.v1') {
      try { const cur = JSON.parse(v); const totalReps = Object.values(cur).reduce((a, c) => a + (c.reps || 0) + (c.lapses || 0), 0); if (lastTotalReps !== null && totalReps > lastTotalReps) { Stats.touch('cards', totalReps - lastTotalReps); } lastTotalReps = totalReps; } catch {}
    }
  };
  try { const cur = JSON.parse(localStorage.getItem('sumi.n3.srs.v1') || '{}'); lastTotalReps = Object.values(cur).reduce((a, c) => a + (c.reps || 0) + (c.lapses || 0), 0); } catch {}

  const Today = ({ onJump }) => {
    const [s, setS] = useState(Stats.get());
    useEffect(() => Stats.subscribe(() => setS(Stats.get())), []);
    const today = new Date();
    const dayName = today.toLocaleDateString('en-US', { weekday: 'long' });
    const dateLine = today.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    const done = s.daily[todayStr()] || {};
    const nowMs = Date.now();
    const srsData = (() => { try { return JSON.parse(localStorage.getItem('sumi.n3.srs.v1') || '{}'); } catch { return {}; } })();
    const vocabDue = Object.values(srsData).filter(c => c.due && c.due <= nowMs).length;
    const vocabNewCount = Math.max(0, (window.N3_VOCAB || []).length - Object.keys(srsData).length);
    const readingCount = (window.N3_READING || []).length;
    const listeningCount = (window.N3_LISTENING || []).length;
    const plan = [
      { id: 'cards',     k: '札', label: 'Vocab review',    target: 'cards',
        count: vocabDue > 0 ? `${vocabDue} due · ${Math.min(vocabNewCount, 20)} new` : vocabNewCount > 0 ? `${Math.min(vocabNewCount, 20)} new cards` : 'all reviewed ✓',
        urgent: vocabDue > 0 },
      { id: 'kanji',     k: '漢', label: 'Kanji',           target: 'kanji',     count: `${(window.N3_KANJI||[]).length} to study` },
      { id: 'grammar',   k: '文', label: 'Grammar drill',   target: 'grammar',   count: `${(window.N3_GRAMMAR||[]).length} patterns` },
      { id: 'reading',   k: '読', label: 'Reading',         target: 'reading',   count: `${readingCount} passages` },
      { id: 'listening', k: '聴', label: 'Listening',       target: 'listening', count: `${listeningCount} lines` },
    ];
    const doneCount = plan.filter(p => done[p.id]).length;
    const handleTile = (p) => { Stats.touch(p.id, 1); onJump(p.target); };
    const toggleTile = (e, p) => { e.stopPropagation(); const cur = Stats.get(); const dk = todayStr(); cur.daily[dk] = cur.daily[dk] || {}; const was = !!cur.daily[dk][p.id]; cur.daily[dk][p.id] = !was; cur.days[dk] = Math.max(0, (cur.days[dk] || 0) + (was ? -1 : 1)); cur.streak = computeStreak(cur); save(cur); };
    const heat = Stats.heat14();
    const dayN = Stats.dayN();
    const wod = (() => { const pool = window.N3_VOCAB || []; if (!pool.length) return null; const seed = today.getFullYear() * 1000 + today.getMonth() * 32 + today.getDate(); return pool[seed % pool.length]; })();
    const srs = (() => { try { return JSON.parse(localStorage.getItem('sumi.n3.srs.v1') || '{}'); } catch { return {}; } })();
    const vocabKnown = Object.values(srs).filter(c => (c.reps || 0) >= 2).length;
    const vocabSeen  = Object.keys(srs).length;
    const vocabTotal = (window.N3_VOCAB || []).length || 0;
    const kanjiTotal = (window.N3_KANJI || []).length || 0;
    const grammarTotal = (window.N3_GRAMMAR || []).length || 0;
    const corpus = [
      { label: 'Vocab known',     cur: vocabKnown,                   total: vocabTotal,   color: 'var(--ink)',       sub: `${vocabSeen} seen` },
      { label: 'Kanji learned',   cur: (s.seenKanji || []).length,   total: kanjiTotal,   color: 'var(--indigo)' },
      { label: 'Grammar points',  cur: (s.seenGrammar || []).length, total: grammarTotal, color: 'var(--persimmon)' },
      { label: 'Mock test score', cur: s.mockScore || 0,             total: 180,          color: 'var(--moss)' },
    ];
    const greet = (() => { const hour = today.getHours(); const g = hour < 5 ? 'こんばんは' : hour < 11 ? 'おはよう' : hour < 18 ? 'こんにちは' : 'こんばんは'; return `${g}, ${s.name || '友'}`; })();
    const daysToTarget = s.target ? Math.max(0, Math.ceil((new Date(s.target).getTime() - Date.now()) / 86400000)) : null;

    return (
      <div data-screen-label="01 Today">
        <div className="page-head">
          <div>
            <h1 className="page-title"><span className="kanji">本日</span>Today</h1>
            <div className="page-sub"><span className="jp">{greet}</span> · {dayN > 0 ? `Day ${dayN}` : 'Day 1'} · {dayName}, {dateLine}</div>
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button className="btn"><span className="mono">JLPT N3</span></button>
            <button className="btn btn-primary" onClick={() => onJump('cards')}>Begin review →</button>
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 22, marginBottom: 22 }}>
          <div className="card raised" style={{ padding: 0 }}>
            <div style={{ padding: '20px 24px 14px', borderBottom: '1px solid var(--line-soft)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div><div className="label">Daily plan</div><div className="en-disp" style={{ fontSize: 22, marginTop: 4 }}>{vocabDue > 0 ? <span style={{ color: 'var(--persimmon)' }}>{vocabDue} cards due</span> : '5 tasks today'}</div></div>
              <div style={{ textAlign: 'right' }}><div className="mono" style={{ color: 'var(--ink-4)' }}>PROGRESS</div><div className="en-disp" style={{ fontSize: 22, color: doneCount === 5 ? 'var(--moss)' : 'var(--ink-2)' }}>{doneCount} / 5</div></div>
            </div>
            <div>
              {plan.map((p, i) => {

                <div style={{ height: 4, background: 'var(--line-soft)', borderRadius: 2, overflow: 'hidden' }}><div style={{ width: `${st.total ? Math.min(100, (st.cur / st.total) * 100) : 0}%`, height: '100%', background: st.color, transition: 'width .5s' }} /></div>

<script type="text/babel">
(() => {
const { useState: uSx, useEffect: uEx, useMemo: uMx, useRef: uRx } = React;

/* ── BOOKMARK SYSTEM ── */

window.BM = {
  list: bmLoad,
  has(jp) { return bmLoad().some(b => b.jp === jp); },
  toggle(item) { const cur = bmLoad(); const idx = cur.findIndex(b => b.jp === item.jp); if (idx >= 0) { cur.splice(idx, 1); } else { cur.unshift(item); } bmSave(cur); },
};

/* ── VOCAB TOPIC AUTO-TAGGER ── */
const TOPIC_PATTERNS = [
  { id: 'food',     label: '食べ物', re: /\b(eat|food|cook|meal|drink|taste|flavor|rice|fish|meat|vegetable|kitchen|dish|restaurant|menu|hunger|cuisine|snack|bread|soup|appetite)\b/i },

  { id: 'work',     label: '仕事',   re: /\b(work|job|office|company|boss|salary|meeting|business|career|employee|hire|resign|task|project|report|colleague|profession|manage|budget|deadline)\b/i },
  { id: 'travel',   label: '旅行',   re: /\b(travel|trip|journey|transport|train|bus|flight|station|hotel|luggage|tourism|road|direction|map|ticket|destination|airport|tourist|vehicle|drive)\b/i },
  { id: 'nature',   label: '自然',   re: /\b(nature|weather|rain|snow|wind|sun|cloud|season|mountain|river|forest|flower|tree|earth|ocean|sea|sky|storm|temperature|plant|animal|fire|water)\b/i },
  { id: 'health',   label: '体・健康', re: /\b(body|health|sick|illness|pain|medicine|doctor|hospital|exercise|sleep|rest|tired|strong|weak|energy|injury|symptom|treatment|heart|mind|mental|physical)\b/i },
  { id: 'study',    label: '学校',   re: /\b(study|school|class|learn|teach|exam|test|grade|student|university|knowledge|language|subject|lesson|research|education|professor|skill|practice|grammar|vocabulary)\b/i },
  { id: 'society',  label: '社会',   re: /\b(society|social|news|politics|law|culture|tradition|history|government|economy|community|public|media|environment|democracy|rights|country|nation)\b/i },
  { id: 'people',   label: '人・家族', re: /\b(family|parent|child|friend|person|people|husband|wife|brother|sister|relative|stranger|neighbor|relationship|human|baby|adult|elder|youth)\b/i },
  { id: 'time',     label: '時間・場所', re: /\b(time|place|location|moment|period|date|past|future|present|now|before|after|always|often|sometimes|never|position|area|space|direction|near|far)\b/i },
];
function getVocabTopic(v) {
  const text = (v.en || '') + ' ' + (v.pos || '');
  for (const tp of TOPIC_PATTERNS) { if (tp.re.test(text)) return tp.id; }
  return null;
}
window.TOPIC_PATTERNS = TOPIC_PATTERNS;
window.getVocabTopic = getVocabTopic;

/* ── BOOKMARK SCREEN ── */
const Bookmarks = () => {
  const [bms, setBms] = uSx(window.BM.list());
  const [filter, setFilter] = uSx('all');
  const refresh = () => setBms(window.BM.list());
  const remove = (jp) => { window.BM.toggle({ jp }); refresh(); };
  const types = ['all', 'vocab', 'kanji'];

      </div>
      <div style={{ marginBottom: 16, display: 'flex', gap: 6 }}>

      </div>
      {shown.length === 0 ? (
        <div className="card raised" style={{ textAlign: 'center', padding: '80px 24px' }}>
          <div className="jp-disp" style={{ fontSize: 48 }}>☆</div>
          <div className="en-disp" style={{ fontSize: 18, color: 'var(--ink-3)', fontStyle: 'italic', marginTop: 12 }}>No bookmarks yet — tap ☆ on any card or kanji to star it.</div>
        </div>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12 }}>
          {shown.map((b, i) => (
            <div key={i} className="card raised" style={{ padding: '18px 22px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'baseline' }}>
                  <span className="jp-disp" style={{ fontSize: 32 }}>{b.jp}</span>
                  {b.kana && <span className="jp" style={{ color: 'var(--ink-4)', fontSize: 13 }}>{b.kana}</span>}
                </div>
                {b.en && <div className="en-disp" style={{ fontStyle: 'italic', color: 'var(--ink-3)', fontSize: 14, marginTop: 4 }}>{b.en}</div>}
                <div className="mono" style={{ color: 'var(--ink-4)', fontSize: 10, marginTop: 6 }}>{(b.type || 'vocab').toUpperCase()}{b.pos ? ` · ${b.pos}` : ''}</div>
              </div>
              <button onClick={() => remove(b.jp)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 20, color: 'var(--gold)', padding: '0 4px' }} title="Remove bookmark">★</button>
            </div>
          ))}
        </div>
      )}

  );
};
window.Bookmarks = Bookmarks;

/* ── KANJI SRS ── */
const KANJI_SRS_KEY = 'sumi.n3.kanji.srs.v1';
const KanjiSRS_Load = () => { try { return JSON.parse(localStorage.getItem(KANJI_SRS_KEY) || '{}'); } catch { return {}; } };
const KanjiSRS_Save = (s) => { try { localStorage.setItem(KANJI_SRS_KEY, JSON.stringify(s)); } catch {} };

const KanjiStudyMode = ({ onBack }) => {
  const deck = window.N3_KANJI || [];
  const [state, setState] = uSx(() => KanjiSRS_Load());
  const [tick, setTick] = uSx(0);
  const [revealed, setRevealed] = uSx(false);
  const [reviewed, setReviewed] = uSx(0);
  const [bms, setBms] = uSx(window.BM.list());
  const queue = uMx(() => {
    const now = Date.now();
    const due = deck.map((k, i) => ({ i, k, s: state[k.c] })).filter(x => x.s && x.s.due <= now).sort((a, b) => a.s.due - b.s.due);
    const newK = deck.map((k, i) => ({ i, k, s: null })).filter(x => !state[x.k.c]);
    return [...due, ...newK];
  }, [deck, state, tick]);
  const cur = queue[0];
  const grade = (g) => {
    if (!cur) return;
    const next = SRS.apply(state[cur.k.c] || {}, g);
    const ns = { ...state, [cur.k.c]: next };
    setState(ns); KanjiSRS_Save(ns); setReviewed(r => r + 1); setRevealed(false); setTick(t => t + 1);
  };
  uEx(() => {
    const h = (e) => { if (e.key === ' ') { e.preventDefault(); setRevealed(r => !r); } else if (revealed) { if (e.key === '1') grade('again'); if (e.key === '2') grade('hard'); if (e.key === '3') grade('good'); if (e.key === '4') grade('easy'); } };
    window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h);
  });
  const dueCount = uMx(() => { const now = Date.now(); return deck.filter(k => state[k.c] && state[k.c].due <= now).length; }, [state, tick]);
  const newCount = deck.length - Object.keys(state).length;
  const grades = [
    { id: 'again', label: 'Again', jp: 'もう一度', color: 'var(--rouge)' },
    { id: 'hard',  label: 'Hard',  jp: '難しい',   color: 'var(--persimmon)' },
    { id: 'good',  label: 'Good',  jp: 'できた',   color: 'var(--moss)' },
    { id: 'easy',  label: 'Easy',  jp: '簡単',     color: 'var(--indigo)' },
  ];
  const previewIvl = (g) => { if (!cur) return ''; const next = SRS.apply(state[cur.k.c] || {}, g); if (next.ivl === 0) return '<1m'; if (next.ivl === 1) return '1d'; return next.ivl + 'd'; };
  if (!cur) return (
    <div>
      <button className="btn" style={{ marginBottom: 18 }} onClick={onBack}>← Back to browse</button>
      <div className="card raised" style={{ textAlign: 'center', padding: '80px 24px' }}>
        <div className="jp-disp" style={{ fontSize: 64 }}>完了</div>
        <div className="en-disp" style={{ fontSize: 22, color: 'var(--ink-3)', fontStyle: 'italic', marginTop: 12 }}>All kanji reviewed — great work!</div>
        <div className="mono" style={{ color: 'var(--ink-4)', marginTop: 18 }}>{reviewed} reviewed this session</div>
      </div>
    </div>
  );
  const k = cur.k; const st = state[k.c];
  const isBookmarked = bms.some(b => b.jp === k.c);
  const toggleBm = () => { window.BM.toggle({ jp: k.c, en: k.en, kana: (k.on || '') + (k.kun ? ' · ' + k.kun : ''), type: 'kanji' }); setBms(window.BM.list()); };
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <button className="btn" onClick={onBack}>← Browse</button>
        <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
          <span className="mono" style={{ color: 'var(--persimmon)' }}>{dueCount} due</span>
          <span className="mono" style={{ color: 'var(--indigo)' }}>{newCount} new</span>
          <span className="mono" style={{ color: 'var(--moss)' }}>{reviewed} done</span>
        </div>
      </div>
      <div style={{ position: 'relative', maxWidth: 720, margin: '0 auto' }}>
        <div style={{ position: 'absolute', inset: 0, background: 'var(--card)', borderRadius: 14, border: '1px solid var(--line)', transform: 'translate(6px, 6px) rotate(.5deg)', zIndex: 0 }} />
        <div className="card raised" style={{ position: 'relative', zIndex: 1, minHeight: 360, padding: 0 }}>
          <div style={{ padding: '14px 22px', borderBottom: '1px solid var(--line-soft)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span className="mono" style={{ color: 'var(--ink-4)' }}>KANJI · N3 · {st ? `seen ${st.reps}× · ef ${st.ef.toFixed(2)}` : 'NEW'}</span>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-ghost" onClick={() => window.speakJP(k.c)} style={{ fontSize: 13 }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 010 7"/></svg> hear
              </button>
              <button onClick={toggleBm} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 20, color: isBookmarked ? 'var(--gold)' : 'var(--ink-4)' }}>{isBookmarked ? '★' : '☆'}</button>
            </div>
          </div>
          <div style={{ padding: '40px 40px 30px', display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
            <div className="jp-disp" style={{ fontSize: 120, lineHeight: 1 }}>{k.c}</div>
            {revealed ? (
              <>
                <div style={{ height: 1, width: 60, background: 'var(--line)', margin: '28px 0 20px' }} />
                {k.on && <div style={{ marginBottom: 6 }}><span className="mono" style={{ color: 'var(--ink-4)', fontSize: 11 }}>ON</span> <span className="jp" style={{ fontSize: 20 }}>{k.on}</span></div>}
                {k.kun && <div style={{ marginBottom: 6 }}><span className="mono" style={{ color: 'var(--ink-4)', fontSize: 11 }}>KUN</span> <span className="jp" style={{ fontSize: 18 }}>{k.kun}</span></div>}
                <div className="en-disp" style={{ fontSize: 22, marginTop: 10, fontStyle: 'italic' }}>{k.en}</div>
                {k.words && k.words.length > 0 && (
                  <div style={{ marginTop: 16, display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'center' }}>
                    {k.words.slice(0, 4).map((w, wi) => <span key={wi} className="jp" style={{ padding: '3px 8px', background: 'var(--paper-light)', borderRadius: 4, fontSize: 14, border: '1px solid var(--line-soft)' }}>{w}</span>)}
                  </div>
                )}
              </>
            ) : (
              <button onClick={() => setRevealed(true)} className="btn" style={{ marginTop: 28 }}>Show readings · <span className="mono">SPACE</span></button>
            )}
          </div>
          {revealed && (
            <div style={{ borderTop: '1px solid var(--line-soft)', padding: 14, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
              {grades.map((g, i) => (
                <button key={g.id} onClick={() => grade(g.id)} style={{ border: '1px solid var(--line)', borderRadius: 8, padding: '12px 8px', background: 'var(--card)', cursor: 'pointer', textAlign: 'center' }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = g.color; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--line)'; }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}><span className="mono" style={{ color: 'var(--ink-4)' }}>{i + 1}</span><span className="mono" style={{ color: g.color }}>{previewIvl(g.id)}</span></div>
                  <div style={{ fontWeight: 600, fontSize: 14, color: g.color }}>{g.label}</div>
                  <div className="jp" style={{ fontSize: 12, color: 'var(--ink-4)', marginTop: 2 }}>{g.jp}</div>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
      <div style={{ textAlign: 'center', marginTop: 16, color: 'var(--ink-4)' }}>
        <span className="mono">SPACE</span> reveal · <span className="mono">1–4</span> grade
      </div>
    </div>
  );
};
window.KanjiStudyMode = KanjiStudyMode;

/* ── AUDIO QUIZ ── */
function shuffleArr(a) { a = [...a]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

const AudioQuiz = () => {
  const pool = uMx(() => (window.N3_VOCAB || []).filter(v => v.jp && v.en), []);
  const [item, setItem] = uSx(null);
  const [picked, setPicked] = uSx(null);
  const [hasPlayed, setHasPlayed] = uSx(false);
  const [score, setScore] = uSx({ right: 0, wrong: 0, streak: 0, best: 0 });
  const [autoPlay, setAutoPlay] = uSx(true);
  const [speed, setSpeed] = uSx(0.9);
  const [history, setHistory] = uSx([]);

  const build = uMx(() => () => {
    if (!pool.length) return null;
    const word = pool[Math.floor(Math.random() * pool.length)];
    const distractors = shuffleArr(pool.filter(x => x.jp !== word.jp && x.en !== word.en)).slice(0, 3).map(x => x.en);
    return { word, choices: shuffleArr([word.en, ...distractors]) };
  }, [pool]);

  const next = () => {
    const it = build();
    setItem(it); setPicked(null); setHasPlayed(false);
    if (it && autoPlay) { setTimeout(() => { window.speakJP(it.word.jp, speed); setHasPlayed(true); }, 200); }
  };

  uEx(() => { next(); }, []);

  const speak = () => { if (!item) return; window.speakJP(item.word.jp, speed); setHasPlayed(true); };

  const pick = (choice) => {
    if (picked || !item) return;
    setPicked(choice);
    const correct = choice === item.word.en;
    setScore(s => {
      const streak = correct ? s.streak + 1 : 0;
      return { right: s.right + (correct ? 1 : 0), wrong: s.wrong + (correct ? 0 : 1), streak, best: Math.max(s.best, streak) };
    });
    setHistory(h => [{ jp: item.word.jp, kana: item.word.kana, en: item.word.en, correct, picked: choice }, ...h.slice(0, 9)]);
  };

  uEx(() => {
    const h = (e) => {
      if (!item) return;
      if (!hasPlayed && e.key === ' ') { e.preventDefault(); speak(); return; }
      if (picked) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); next(); } return; }
      if (item && e.key >= '1' && e.key <= '4') { const idx = parseInt(e.key) - 1; if (item.choices[idx]) pick(item.choices[idx]); }
    };
    window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h);
  });

  if (!pool.length) return <div className="card raised" style={{ padding: 40 }}>No vocab loaded.</div>;

  const accuracy = score.right + score.wrong > 0 ? Math.round((score.right / (score.right + score.wrong)) * 100) : null;

  return (
    <div data-screen-label="Audio Quiz">
      <div className="page-head">
        <div><h1 className="page-title"><span className="kanji">耳</span>Audio Quiz</h1><div className="page-sub">Listen · identify · {pool.length} words in pool</div></div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <span className="mono" style={{ color: 'var(--ink-4)' }}>SPEED</span>
          {[0.7, 0.9, 1.0, 1.2].map(r => (
            <button key={r} onClick={() => setSpeed(r)} className="btn" style={{ padding: '5px 10px', background: speed === r ? 'var(--ink)' : 'var(--card)', color: speed === r ? 'var(--paper-light)' : 'var(--ink-3)', borderColor: speed === r ? 'var(--ink)' : 'var(--line)' }}>{r}×</button>
          ))}
          <button onClick={() => setAutoPlay(a => !a)} className="btn" style={{ padding: '5px 10px', background: autoPlay ? 'var(--indigo)' : 'var(--card)', color: autoPlay ? 'var(--paper-light)' : 'var(--ink-3)', borderColor: autoPlay ? 'var(--indigo)' : 'var(--line)' }}>Auto-play {autoPlay ? 'on' : 'off'}</button>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 280px', gap: 24 }}>
        <div>
          <div className="card raised" style={{ padding: '40px 48px', marginBottom: 20 }}>
            <div style={{ display: 'flex', gap: 18, alignItems: 'center', marginBottom: 32, justifyContent: 'center' }}>
              <button onClick={speak} style={{ width: 80, height: 80, borderRadius: '50%', background: hasPlayed ? 'var(--ink)' : 'var(--persimmon)', color: 'var(--paper-light)', display: 'grid', placeItems: 'center', border: 'none', cursor: 'pointer', transition: 'all .15s', flexShrink: 0 }}
                onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.06)'}
                onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
                <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 010 7" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><path d="M19 5a9 9 0 010 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
              </button>
              <div>
                <div style={{ fontWeight: 600, color: 'var(--ink-2)', fontSize: 15 }}>{hasPlayed ? 'Choose the correct meaning below' : 'Press play to hear the word'}</div>
                <div className="mono" style={{ color: 'var(--ink-4)', marginTop: 4, fontSize: 12 }}>
                  {!hasPlayed ? 'SPACE to play' : picked ? '' : '1–4 to answer'}
                </div>
              </div>
            </div>

            {item && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                {item.choices.map((ch, ci) => {
                  const isAnswer = ch === item.word.en; const isPicked = ch === picked;
                  let bg = 'var(--card)', border = 'var(--line)', color = 'var(--ink)';
                  if (picked) { if (isAnswer) { bg = 'rgba(108,122,74,.18)'; border = 'var(--moss)'; color = 'var(--moss)'; } else if (isPicked) { bg = 'rgba(138,58,58,.12)'; border = 'var(--rouge)'; color = 'var(--rouge)'; } else { color = 'var(--ink-4)'; } }
                  return (
                    <button key={ci} onClick={() => pick(ch)} disabled={!!picked || !hasPlayed}
                      style={{ padding: '18px 20px', borderRadius: 10, border: '1px solid', borderColor: border, background: bg, color, cursor: (picked || !hasPlayed) ? 'default' : 'pointer', textAlign: 'left', fontSize: 15, lineHeight: 1.4, fontWeight: picked && isAnswer ? 600 : 400, transition: 'all .15s' }}>
                      <span className="mono" style={{ color: 'inherit', opacity: .5, marginRight: 8, fontSize: 11 }}>{ci + 1}</span>{ch}
                    </button>
                  );
                })}
              </div>
            )}

            {picked && item && (
              <div style={{ marginTop: 24, paddingTop: 18, borderTop: '1px dashed var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontSize: 18, fontWeight: 600, color: picked === item.word.en ? 'var(--moss)' : 'var(--rouge)' }}>
                    {picked === item.word.en ? '✓ Correct!' : '✗ Not quite'}
                  </div>
                  <div style={{ marginTop: 8, display: 'flex', gap: 12, alignItems: 'baseline' }}>
                    <span className="jp-disp" style={{ fontSize: 32 }}>{item.word.jp}</span>
                    <span className="jp" style={{ color: 'var(--ink-4)', fontSize: 14 }}>{item.word.kana}</span>
                    <span className="en-disp" style={{ fontStyle: 'italic', color: 'var(--ink-3)', fontSize: 14 }}>"{item.word.en}"</span>
                  </div>
                </div>
                <button className="btn btn-primary" onClick={next}>Next → <span className="mono" style={{ fontSize: 10 }}>↵</span></button>
              </div>
            )}

            {!picked && (
              <div style={{ marginTop: 24, textAlign: 'center' }}>
                <button className="btn btn-ghost" onClick={next} style={{ fontSize: 13 }}>Skip this word →</button>
              </div>
            )}
          </div>
        </div>

        <div>
          <div className="card raised" style={{ padding: '20px 22px', marginBottom: 16 }}>
            <div className="label" style={{ marginBottom: 12 }}>Session score</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
              <div><div className="mono" style={{ color: 'var(--ink-4)', fontSize: 10 }}>CORRECT</div><div className="en-disp" style={{ fontSize: 32, color: 'var(--moss)' }}>{score.right}</div></div>
              <div><div className="mono" style={{ color: 'var(--ink-4)', fontSize: 10 }}>WRONG</div><div className="en-disp" style={{ fontSize: 32, color: 'var(--rouge)' }}>{score.wrong}</div></div>
              <div><div className="mono" style={{ color: 'var(--ink-4)', fontSize: 10 }}>STREAK</div><div className="en-disp" style={{ fontSize: 32, color: 'var(--indigo)' }}>{score.streak}</div></div>
              <div><div className="mono" style={{ color: 'var(--ink-4)', fontSize: 10 }}>ACCURACY</div><div className="en-disp" style={{ fontSize: 32 }}>{accuracy !== null ? `${accuracy}%` : '—'}</div></div>
            </div>
            {score.best > 3 && <div className="mono" style={{ color: 'var(--gold)', fontSize: 11 }}>🏆 Best streak: {score.best}</div>}
          </div>

          <div className="card" style={{ padding: '16px 18px' }}>
            <div className="label" style={{ marginBottom: 10, fontSize: 11 }}>Recent</div>
            {history.length === 0 ? <div className="mono" style={{ color: 'var(--ink-4)', fontSize: 11 }}>Nothing yet</div> : history.map((h, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '5px 0', borderBottom: i < history.length - 1 ? '1px solid var(--line-soft)' : 'none' }}>
                <span style={{ fontSize: 13, color: h.correct ? 'var(--moss)' : 'var(--rouge)' }}>{h.correct ? '✓' : '✗'}</span>
                <span className="jp" style={{ fontSize: 16 }}>{h.jp}</span>
                <span className="en-disp" style={{ fontSize: 11, color: 'var(--ink-4)', fontStyle: 'italic', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{h.en}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};
window.AudioQuiz = AudioQuiz;

})();
</script>

<script type="text/babel">
const GH_TOKEN_KEY = 'sumi.gh.token';
const GH_GIST_KEY  = 'sumi.gh.gist';

const GitHubSync = () => {
  const [token, setToken]   = React.useState(() => localStorage.getItem(GH_TOKEN_KEY) || '');
  const [status, setStatus] = React.useState('');
  const [saving, setSaving] = React.useState(false);

  const allData = () => ({
    exported: new Date().toISOString(),
    srs:      (() => { try { return JSON.parse(localStorage.getItem('sumi.n3.srs.v1') || '{}'); } catch { return {}; } })(),
    personal: (() => { try { return JSON.parse(localStorage.getItem('sumi.n3.personal.v1') || '{}'); } catch { return {}; } })(),
    userDeck: (() => { try { return JSON.parse(localStorage.getItem('sumi.n3.userdeck.v1') || '[]'); } catch { return []; } })(),
    app: 'sumi.n3', version: 2,
  });

  const saveToken = (t) => { setToken(t); localStorage.setItem(GH_TOKEN_KEY, t); };

  const push = async () => {
    if (!token) { setStatus('⚠ Enter a GitHub token first.'); return; }
    setSaving(true); setStatus('Saving…');
    try {
      const content = JSON.stringify(allData(), null, 2);
      const existingGist = localStorage.getItem(GH_GIST_KEY);
      let res;
      if (existingGist) {
        res = await fetch(`https://api.github.com/gists/${existingGist}`, {
          method: 'PATCH',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ files: { 'sumi-n3-progress.json': { content } } }),
        });
      } else {
        res = await fetch('https://api.github.com/gists', {
          method: 'POST',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ description: 'Sumi N3 progress', public: false, files: { 'sumi-n3-progress.json': { content } } }),
        });
      }
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      localStorage.setItem(GH_GIST_KEY, data.id);
      setStatus('✓ Saved to GitHub gist');
    } catch (e) {
      setStatus('✗ Error: ' + e.message);
    }
    setSaving(false);
  };

  const pull = async () => {
    if (!token) { setStatus('⚠ Enter a GitHub token first.'); return; }
    const gistId = localStorage.getItem(GH_GIST_KEY);
    if (!gistId) { setStatus('⚠ No saved gist found. Save first.'); return; }
    setSaving(true); setStatus('Loading…');
    try {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: { Authorization: `token ${token}` },
      });
      if (!res.ok) throw new Error(await res.text());
      const gist = await res.json();
      const content = gist.files['sumi-n3-progress.json']?.content;
      if (!content) throw new Error('File not found in gist');
      const data = JSON.parse(content);
      if (data.srs)      localStorage.setItem('sumi.n3.srs.v1',       JSON.stringify(data.srs));
      if (data.personal) localStorage.setItem('sumi.n3.personal.v1',  JSON.stringify(data.personal));
      if (data.userDeck) localStorage.setItem('sumi.n3.userdeck.v1',  JSON.stringify(data.userDeck));
      setStatus('✓ Progress restored — reload to apply');
    } catch (e) {
      setStatus('✗ Error: ' + e.message);
    }
    setSaving(false);
  };

  return (
    <div style={{ marginTop: 22 }}>
      <div className="label" style={{ marginBottom: 8 }}>GitHub sync</div>
      <div className="en-disp" style={{ fontStyle: 'italic', color: 'var(--ink-3)', marginBottom: 14, fontSize: 13 }}>
        Store progress in a private GitHub Gist — access it from any device.
      </div>
      <div style={{ marginBottom: 10 }}>
        <div className="mono" style={{ color: 'var(--ink-4)', marginBottom: 5 }}>GITHUB TOKEN (stored locally)</div>
        <input
          type="password"
          value={token}
          onChange={e => saveToken(e.target.value)}
          placeholder="ghp_..."
          style={{ width: '100%', padding: '10px 12px', border: '1px solid var(--line)', background: 'var(--paper-light)', fontFamily: 'var(--mono)', fontSize: 12, borderRadius: 6, color: 'var(--ink)', outline: 'none' }}
        />
        <div style={{ fontSize: 11, color: 'var(--ink-4)', marginTop: 4 }}>
          Needs <span className="mono">gist</span> scope. <a href="https://github.com/settings/tokens" target="_blank" style={{ color: 'var(--indigo)' }}>Create token →</a>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
        <button className="btn btn-primary" onClick={push} disabled={saving}>↑ Save to GitHub</button>
        <button className="btn" onClick={pull} disabled={saving}>↓ Load from GitHub</button>
        {status && <span className="en-disp" style={{ fontStyle: 'italic', fontSize: 13, color: status.startsWith('✓') ? 'var(--moss)' : status.startsWith('✗') ? 'var(--rouge)' : 'var(--ink-4)' }}>{status}</span>}
      </div>
    </div>
  );
};
window.GitHubSync = GitHubSync;
</script>

<!-- ── PWA SERVICE WORKER ── -->
<script>
(function() {
  if (!('serviceWorker' in navigator)) return;
  const SW = `
const CACHE = 'sumi-n3-v1';
const FONT_URLS = [
  'https://fonts.googleapis.com',
  'https://fonts.gstatic.com',
  'https://cdn.jsdelivr.net',
  'https://unpkg.com'
];
self.addEventListener('install', () => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(
  caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k))))
));
self.addEventListener('fetch', e => {
  const url = e.request.url;
  if (FONT_URLS.some(f => url.startsWith(f))) {
    e.respondWith(caches.open(CACHE).then(cache =>
      cache.match(e.request).then(hit => hit || fetch(e.request).then(r => { if (r.ok) cache.put(e.request, r.clone()); return r; }))
    ));
  }
});
`;
  try {
    const blob = new Blob([SW], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).then(reg => {
      reg.update();
    }).catch(() => {});
  } catch(e) {}
})();
</script>

@keyframes sakura-fall {
  0%   { transform: translateY(0) rotate(0deg) translateX(0);   opacity: 0; }
  5%   { opacity: 0.85; }
  90%  { opacity: 0.7; }
  100% { transform: translateY(105vh) rotate(720deg) translateX(var(--drift)); opacity: 0; }
}
</style>
<script>
(function() {
  const COLORS = ['#f9b8c4','#f7c5d0','#f4a7b9','#fbd0d8','#f8bcc8','#ffe0e8'];
  const SVG = (color) => `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
    <ellipse cx="9" cy="4.5" rx="3.5" ry="4.5" fill="${color}" transform="rotate(0,9,9)" opacity=".92"/>
    <ellipse cx="9" cy="4.5" rx="3.5" ry="4.5" fill="${color}" transform="rotate(72,9,9)" opacity=".92"/>
    <ellipse cx="9" cy="4.5" rx="3.5" ry="4.5" fill="${color}" transform="rotate(144,9,9)" opacity=".92"/>
    <ellipse cx="9" cy="4.5" rx="3.5" ry="4.5" fill="${color}" transform="rotate(216,9,9)" opacity=".92"/>
    <ellipse cx="9" cy="4.5" rx="3.5" ry="4.5" fill="${color}" transform="rotate(288,9,9)" opacity=".92"/>
    <circle cx="9" cy="9" r="2" fill="#f9e0e8"/>
  </svg>`;

  const PETAL_COUNT = 18;
  const petals = [];

  function createPetal() {
    const el = document.createElement('div');
    el.className = 'sakura-petal';
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const size = 10 + Math.random() * 14;
    el.innerHTML = SVG(color);
    el.querySelector('svg').style.width = size + 'px';
    el.querySelector('svg').style.height = size + 'px';
    el.style.left = (Math.random() * 105 - 2) + 'vw';
    const duration = 6 + Math.random() * 10;
    const delay = Math.random() * 12;
    const drift = (Math.random() * 120 - 60);
    el.style.setProperty('--drift', drift + 'px');
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = delay + 's';
    document.body.appendChild(el);
    return el;
  }

  function init() {
    for (let i = 0; i < PETAL_COUNT; i++) petals.push(createPetal());
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
